<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EasyFood — Para ti</title>
<link rel="stylesheet" href="shared.css">
<style>
.page-content { padding-bottom:80px; }

/* Hero */
.phero {
  background:var(--surface);padding:56px 20px 28px;
  position:relative;overflow:hidden;border-bottom:1px solid var(--border);
}
@media(min-width:768px){ .phero{padding:40px 40px 28px;} }
.orb1 { position:absolute;top:-60px;right:-40px;width:280px;height:280px;border-radius:50%;background:var(--brand);opacity:.07;filter:blur(60px); }
.orb2 { position:absolute;bottom:-40px;left:-20px;width:220px;height:220px;border-radius:50%;background:var(--purple);opacity:.05;filter:blur(50px); }

.hero-top { display:flex;align-items:center;gap:14px;position:relative;z-index:1;margin-bottom:8px; }
.hero-top h1 { font-family:'Syne',sans-serif;font-size:clamp(24px,5vw,36px);letter-spacing:-1px;color:var(--ink); }
.hero-top h1 span { color:var(--brand); }
.hero-sub { font-size:14px;color:var(--ink3);position:relative;z-index:1; }

/* Body */
.pbody { padding:20px; }
@media(min-width:768px){ .pbody{padding:24px 40px;} }

.sec { margin-bottom:32px; }
.sec-header { display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px; }
.sec-header h2 { font-family:'Syne',sans-serif;font-size:19px;letter-spacing:-.4px;color:var(--ink); }
.sec-header span { font-size:12px;color:var(--ink3); }

/* AI Recommendation card */
.ai-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rlg);overflow:hidden;margin-bottom:14px;
  transition:all .2s;
}
.ai-card:hover { border-color:var(--brand);box-shadow:0 0 24px rgba(255,92,0,.12); }

.ai-card-inner { padding:18px; }
.ai-card-header { display:flex;gap:14px;align-items:flex-start;margin-bottom:12px; }
.ai-card-ico {
  width:56px;height:56px;border-radius:16px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:var(--surface2);
}
.ai-card-ico img { width:100%;height:100%;object-fit:contain;padding:4px; }
.ai-card-name { font-family:'Syne',sans-serif;font-size:18px;letter-spacing:-.3px;color:var(--ink);margin-bottom:3px; }
.ai-card-meta { font-size:12px;color:var(--ink3); }

/* Match score */
.match-bar-wrap { margin-bottom:12px; }
.match-label { display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:5px; }
.match-label span:first-child { color:var(--ink2); }
.match-label span:last-child { color:var(--brand); }
.match-bar { height:6px;background:var(--surface3);border-radius:4px;overflow:hidden; }
.match-fill { height:100%;background:linear-gradient(90deg,var(--brand),#FF9500);border-radius:4px;transition:width .8s ease; }

/* AI explanation */
.ai-why {
  background:var(--surface2);border-radius:var(--rsm);
  padding:12px 14px;font-size:13px;color:var(--ink2);
  line-height:1.6;border-left:3px solid var(--brand);
  position:relative;
}
.ai-why-label {
  font-size:10px;font-weight:700;color:var(--brand);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;
  display:flex;align-items:center;gap:5px;
}
.ai-card-footer { display:flex;gap:8px;margin-top:14px;flex-wrap:wrap; }

/* Typing animation */
.typing { display:inline-flex;gap:3px;align-items:center; }
.typing span {
  width:5px;height:5px;border-radius:50%;background:var(--brand);
  animation:bounce .8s infinite;
}
.typing span:nth-child(2) { animation-delay:.15s; }
.typing span:nth-child(3) { animation-delay:.3s; }
@keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

/* Destacados grid */
.dest-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px; }
.dest-card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rlg);padding:16px;cursor:pointer;
  text-decoration:none;display:block;transition:all .2s;
  position:relative;overflow:hidden;
}
.dest-card:hover { border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--sh-md); }
.dest-rank {
  position:absolute;top:12px;right:12px;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;font-family:'Syne',sans-serif;
}
.rank-1 { background:linear-gradient(135deg,#FFD700,#FFA500);color:#000; }
.rank-2 { background:linear-gradient(135deg,#C0C0C0,#A0A0A0);color:#000; }
.rank-3 { background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff; }
.rank-other { background:var(--surface3);color:var(--ink3); }

.dest-header { display:flex;gap:12px;align-items:center;margin-bottom:12px; }
.dest-ico { width:48px;height:48px;border-radius:14px;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0; }
.dest-ico img { width:100%;height:100%;object-fit:contain;padding:4px; }
.dest-name { font-family:'Syne',sans-serif;font-size:15px;color:var(--ink);margin-bottom:2px; }
.dest-meta { font-size:11px;color:var(--ink3); }

.score-wrap { display:flex;align-items:center;gap:8px; }
.score-num { font-family:'Syne',sans-serif;font-size:22px;color:var(--brand); }
.score-bar-wrap { flex:1; }
.score-bar { height:4px;background:var(--surface3);border-radius:2px;overflow:hidden; }
.score-fill { height:100%;background:linear-gradient(90deg,var(--brand),#FF9500);border-radius:2px; }
.score-lbl { font-size:10px;color:var(--ink3);margin-top:3px; }

/* Stats globales */
.global-stats { display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px; }
@media(min-width:480px){ .global-stats{grid-template-columns:repeat(4,1fr);} }
.gsc { background:var(--surface);border:1px solid var(--border);border-radius:var(--rmd);padding:14px;text-align:center;position:relative;overflow:hidden; }
.gsc::before { content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--brand-bg),transparent); }
.gsc-n { font-family:'Syne',sans-serif;font-size:22px;color:var(--brand);position:relative; }
.gsc-l { font-size:10px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;position:relative; }

/* Loading skeleton */
.skel { background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--rlg); }
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<aside class="sidebar hide-mobile">
  <div class="sb-brand"><div class="sb-logo">🍽️</div><span class="sb-name">EasyFood</span></div>
  <a class="sl" href="index.html"><span class="ic">🏠</span> Inicio</a>
  <a class="sl" href="mapa.html"><span class="ic">🗺️</span> Mapa</a>
  <a class="sl active" href="parati.html"><span class="ic">✨</span> Para ti</a>
  <a class="sl" href="resenas.html"><span class="ic">⭐</span> Reseñas</a>
  <a class="sl sl-space" href="perfil.html"><span class="ic">👤</span> Mi Perfil</a>
</aside>

<main class="main-with-sidebar page-content">

  <!-- Hero -->
  <div class="phero">
    <div class="orb1"></div><div class="orb2"></div>
    <div class="hero-top">
      <div>
        <h1>✨ <span>Para ti</span></h1>
      </div>
    </div>
    <p class="hero-sub" id="hero-sub">Recomendaciones personalizadas basadas en tus gustos</p>
  </div>

  <div class="pbody">

    <!-- Stats globales -->
    <div class="global-stats" id="global-stats">
      <div class="skel" style="height:72px"></div>
      <div class="skel" style="height:72px"></div>
      <div class="skel" style="height:72px"></div>
      <div class="skel" style="height:72px"></div>
    </div>

    <!-- Recomendaciones IA -->
    <div class="sec">
      <div class="sec-header">
        <h2>🤖 Recomendaciones para ti</h2>
        <span id="rec-subtitle">Analizando tu perfil…</span>
      </div>
      <div id="rec-grid">
        <div class="skel" style="height:200px;margin-bottom:14px"></div>
        <div class="skel" style="height:200px;margin-bottom:14px"></div>
        <div class="skel" style="height:200px"></div>
      </div>
    </div>

    <!-- Locales destacados -->
    <div class="sec">
      <div class="sec-header">
        <h2>🏆 Locales destacados</h2>
        <span id="dest-subtitle">Por rating y reseñas</span>
      </div>
      <div class="dest-grid" id="dest-grid">
        <div class="skel" style="height:140px"></div>
        <div class="skel" style="height:140px"></div>
        <div class="skel" style="height:140px"></div>
      </div>
    </div>

  </div>
</main>

<nav class="bnav">
  <a class="ni" href="index.html"><span class="ni-icon">🏠</span><span>Inicio</span></a>
  <a class="ni" href="mapa.html"><span class="ni-icon">🗺️</span><span>Mapa</span></a>
  <a class="ni active" href="parati.html"><span class="ni-icon">✨</span><span>Para ti</span></a>
  <a class="ni" href="resenas.html"><span class="ni-icon">⭐</span><span>Reseñas</span></a>
  <a class="ni" href="perfil.html"><span class="ni-icon">👤</span><span>Perfil</span></a>
</nav>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import { SUPABASE_URL, SUPABASE_KEY } from './config.js';

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const { data:{ session } } = await sb.auth.getSession();
if (!session) { location.href='login.html'; }
const uid = session.user.id;

const SVG_MAP = {
  burger:'Hamburger-bro.svg', pizza:'Pizza_sharing-bro.svg',
  ramen:'Ramen-amico.svg', sushi:'Poke_bowl-rafiki.svg',
  seafood:'Poke_bowl-rafiki.svg', healthy:'fruit_salad-pana.svg',
  chilena:'moai-chile.svg', coffee:'fruit_salad-pana.svg',
  parrilla:'food-meat.svg', bar:'moai-chile.svg',
};

// ── Cargar datos del usuario ──────────────────────────────────────────────────
async function getUserContext() {
  const [
    { data: profile },
    { data: reviews },
    { data: favorites },
    { data: achievements }
  ] = await Promise.all([
    sb.from('profiles').select('*,comunas(name)').eq('id', uid).single(),
    sb.from('reviews').select('*,restaurants(name,categories(slug,name),comunas(name))').eq('user_id', uid).order('created_at',{ascending:false}).limit(20),
    sb.from('favorites').select('restaurants(name,categories(slug,name),avg_rating)').eq('user_id', uid),
    sb.from('user_achievements').select('achievements(name,slug)').eq('user_id', uid),
  ]);
  return { profile, reviews: reviews||[], favorites: favorites||[], achievements: achievements||[] };
}

// ── Cargar restaurantes con scores ────────────────────────────────────────────
async function getRestaurantsWithScores() {
  const { data } = await sb.from('restaurant_scores')
    .select('*')
    .order('score', { ascending: false })
    .limit(30);
  return data || [];
}

// ── Stats globales ────────────────────────────────────────────────────────────
async function loadGlobalStats() {
  const [
    { count: totalRestaurants },
    { count: totalReviews },
    { data: topRated },
    { data: verified }
  ] = await Promise.all([
    sb.from('restaurants').select('*',{count:'exact',head:true}).eq('is_active',true),
    sb.from('reviews').select('*',{count:'exact',head:true}),
    sb.from('restaurant_scores').select('real_avg_rating').order('real_avg_rating',{ascending:false}).limit(1).single(),
    sb.from('reviews').select('*',{count:'exact',head:true}).eq('is_verified',true),
  ]);

  document.getElementById('global-stats').innerHTML = `
    <div class="gsc"><div class="gsc-n">${totalRestaurants||0}</div><div class="gsc-l">Restaurantes</div></div>
    <div class="gsc"><div class="gsc-n">${totalReviews||0}</div><div class="gsc-l">Reseñas</div></div>
    <div class="gsc"><div class="gsc-n">★${topRated?.real_avg_rating||'—'}</div><div class="gsc-l">Mejor rating</div></div>
    <div class="gsc"><div class="gsc-n">${verified?.count||0}</div><div class="gsc-l">Verificadas</div></div>`;
}

// ── Locales destacados ────────────────────────────────────────────────────────
async function loadDestacados(restos) {
  const top = restos.slice(0, 9);
  const maxScore = top[0]?.score || 1;

  document.getElementById('dest-subtitle').textContent = `Top ${top.length} por rating y reseñas`;
  document.getElementById('dest-grid').innerHTML = top.map((r, i) => {
    const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
    const pct = Math.round((r.score / maxScore) * 100);
    const svg = SVG_MAP[r.category_slug] || 'moai-chile.svg';
    return `
    <a class="dest-card" href="restaurante.html?id=${r.id}">
      <div class="dest-rank ${rankClass}">${i+1}</div>
      <div class="dest-header">
        <div class="dest-ico"><img src="${svg}" alt="${r.name}"></div>
        <div>
          <div class="dest-name">${r.name}</div>
          <div class="dest-meta">${r.category_name} · ${r.comuna_name}</div>
        </div>
      </div>
      <div class="score-wrap">
        <div class="score-num">★${r.real_avg_rating||r.avg_rating||'—'}</div>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" style="width:${pct}%"></div></div>
          <div class="score-lbl">${r.total_reviews} reseñas · ${r.verified_reviews} verificadas</div>
        </div>
      </div>
      ${r.total_reviews >= 3 ? '<span class="pill pill-green" style="font-size:10px;margin-top:8px">🔥 Muy recomendado</span>' : ''}
    </a>`;
  }).join('');
}

// ── Recomendaciones con IA ────────────────────────────────────────────────────
async function loadRecommendations(userCtx, restos) {
  const { profile, reviews, favorites } = userCtx;

  // Construir contexto del usuario para la IA
  const reviewedIds = reviews.map(r => r.restaurant_id);
  const favIds = favorites.map(f => f.restaurants?.id).filter(Boolean);

  // Categorías más reseñadas por el usuario
  const catCount = {};
  reviews.forEach(r => {
    const slug = r.restaurants?.categories?.slug;
    if (slug) catCount[slug] = (catCount[slug]||0) + 1;
  });
  const topCats = Object.entries(catCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);

  // Rating promedio que da el usuario
  const avgUserRating = reviews.length
    ? (reviews.reduce((a,r)=>a+r.rating,0)/reviews.length).toFixed(1)
    : null;

  // Restaurantes que NO ha visitado, ordenados por score
  const candidates = restos
    .filter(r => !reviewedIds.includes(r.id) && !favIds.includes(r.id))
    .slice(0, 15);

  if (!candidates.length) {
    document.getElementById('rec-grid').innerHTML =
      '<p style="color:var(--ink3);font-size:14px">¡Ya has visitado todos los locales destacados! Explora el mapa para descubrir más.</p>';
    return;
  }

  // Prompt para Claude
  const userProfile = `
Usuario: ${profile?.name || 'Usuario'}
Comuna: ${profile?.comunas?.name || profile?.comuna || 'Santiago'}
Reseñas escritas: ${reviews.length}
Rating promedio que da: ${avgUserRating || 'sin reseñas aún'}
Categorías favoritas: ${topCats.length ? topCats.join(', ') : 'sin datos aún'}
Restaurantes en favoritos: ${favorites.map(f=>f.restaurants?.name).filter(Boolean).join(', ') || 'ninguno aún'}
Últimas reseñas: ${reviews.slice(0,5).map(r=>`${r.restaurants?.name} (${r.rating}★)`).join(', ') || 'ninguna'}
  `.trim();

  const restaurantList = candidates.map(r =>
    `- ${r.name} (${r.category_name}, ${r.comuna_name}, ★${r.real_avg_rating||r.avg_rating}, ${r.total_reviews} reseñas, precio: ${'$'.repeat(r.price_level||2)}, score: ${r.score})`
  ).join('\n');

  document.getElementById('rec-subtitle').innerHTML = `<span class="typing"><span></span><span></span><span></span></span> Analizando con IA…`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Eres el motor de recomendaciones de EasyFood, una app de restaurantes de Santiago de Chile.

Perfil del usuario:
${userProfile}

Restaurantes disponibles (que el usuario NO ha visitado):
${restaurantList}

Recomienda exactamente 3 restaurantes para este usuario. Para cada uno responde SOLO en este formato JSON (sin texto adicional, sin markdown):
[
  {
    "id": "id_del_restaurante_exacto",
    "nombre": "nombre exacto",
    "match": 92,
    "razon": "Explicación breve y personalizada de 1-2 oraciones de por qué le va a gustar a ESTE usuario específico, mencionando sus gustos reales"
  }
]

El campo "match" es un porcentaje de 60-99 que indica qué tan bien se adapta al usuario.
Basa las recomendaciones en: categorías que le gustan, su comuna, su rango de precio habitual, y ratings que suele dar.`
        }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || '[]';
    const clean = text.replace(/```json|```/g, '').trim();
    const recs = JSON.parse(clean);

    document.getElementById('rec-subtitle').textContent = `${recs.length} recomendaciones personalizadas`;

    document.getElementById('rec-grid').innerHTML = recs.map(rec => {
      const resto = restos.find(r => r.id === rec.id || r.name === rec.nombre);
      if (!resto) return '';
      const svg = SVG_MAP[resto.category_slug] || 'moai-chile.svg';
      return `
      <div class="ai-card">
        <div class="ai-card-inner">
          <div class="ai-card-header">
            <div class="ai-card-ico"><img src="${svg}" alt="${resto.name}"></div>
            <div style="flex:1">
              <div class="ai-card-name">${resto.name}</div>
              <div class="ai-card-meta">${resto.category_name} · ${resto.comuna_name} · ${'$'.repeat(resto.price_level||2)}</div>
              <div class="ai-card-meta">★ ${resto.real_avg_rating||resto.avg_rating||'—'} · ${resto.total_reviews} reseñas</div>
            </div>
          </div>
          <div class="match-bar-wrap">
            <div class="match-label">
              <span>Compatibilidad contigo</span>
              <span>${rec.match}%</span>
            </div>
            <div class="match-bar">
              <div class="match-fill" style="width:${rec.match}%"></div>
            </div>
          </div>
          <div class="ai-why">
            <div class="ai-why-label">🤖 Por qué te lo recomendamos</div>
            ${rec.razon}
          </div>
          <div class="ai-card-footer">
            <a href="restaurante.html?id=${resto.id}" class="btn btn-primary btn-sm">Ver local →</a>
            <button class="btn btn-secondary btn-sm" onclick="saveFav('${resto.id}',this)">❤️ Guardar</button>
          </div>
        </div>
      </div>`;
    }).join('');

  } catch(e) {
    console.error(e);
    // Fallback sin IA: recomendar por score y categorías del usuario
    document.getElementById('rec-subtitle').textContent = 'Basado en tu historial';
    const fallback = candidates
      .filter(r => topCats.includes(r.category_slug) || topCats.length === 0)
      .slice(0, 3);

    document.getElementById('rec-grid').innerHTML = fallback.map(r => {
      const svg = SVG_MAP[r.category_slug] || 'moai-chile.svg';
      return `
      <div class="ai-card">
        <div class="ai-card-inner">
          <div class="ai-card-header">
            <div class="ai-card-ico"><img src="${svg}" alt="${r.name}"></div>
            <div style="flex:1">
              <div class="ai-card-name">${r.name}</div>
              <div class="ai-card-meta">${r.category_name} · ${r.comuna_name}</div>
              <div class="ai-card-meta">★ ${r.real_avg_rating||r.avg_rating||'—'} · ${r.total_reviews} reseñas</div>
            </div>
          </div>
          <div class="ai-why">
            <div class="ai-why-label">📊 Por qué te lo recomendamos</div>
            Uno de los mejor evaluados de Santiago que aún no has visitado.
          </div>
          <div class="ai-card-footer">
            <a href="restaurante.html?id=${r.id}" class="btn btn-primary btn-sm">Ver local →</a>
          </div>
        </div>
      </div>`;
    }).join('');
  }
}

// ── Guardar favorito desde recomendación ──────────────────────────────────────
window.saveFav = async (restoId, btn) => {
  btn.disabled = true;
  await sb.from('favorites').insert({ user_id: uid, restaurant_id: restoId });
  btn.textContent = '❤️ Guardado';
  btn.style.color = 'var(--brand)';
};

// ── Init ──────────────────────────────────────────────────────────────────────
const [userCtx, restos] = await Promise.all([
  getUserContext(),
  getRestaurantsWithScores(),
]);

// Personalizar saludo
const nombre = userCtx.profile?.name?.split(' ')[0] || '';
if (nombre) {
  document.getElementById('hero-sub').textContent =
    `Hola ${nombre}, aquí tienes lo mejor según tus gustos`;
}

loadGlobalStats();
loadDestacados(restos);
loadRecommendations(userCtx, restos);
</script>
</body>
</html>
