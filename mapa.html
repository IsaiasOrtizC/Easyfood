<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EasyFood — Mapa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="shared.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
<style>
html, body { height: 100%; overflow: hidden; }

.map-page {
  height: 100vh;
  display: flex; flex-direction: column;
}
@media(min-width:768px){ .map-page { margin-left: 250px; } }

/* Topbar */
.maptop {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 54px 16px 14px; display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; z-index: 100; position: relative;
}
@media(min-width:768px){ .maptop { padding: 20px 32px; } }

.maptop h2 { font-family:'Syne',sans-serif; font-size:18px; letter-spacing:-.4px; flex:1; }
.gps-dot { width:9px;height:9px;border-radius:50%;background:var(--ink3);flex-shrink:0;transition:background .3s; }
.gps-dot.on { background:var(--green);animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

/* Filtros horizontales sobre mapa */
.map-filters {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 99;
  padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.map-filters::-webkit-scrollbar { display: none; }
.mf-btn {
  flex-shrink: 0; padding: 7px 14px; border-radius: 30px;
  font-size: 12px; font-weight: 700; border: 1.5px solid var(--border);
  cursor: pointer; background: var(--surface); color: var(--ink2);
  transition: all .15s; font-family: inherit; white-space: nowrap;
}
.mf-btn.active { background: var(--brand); border-color: var(--brand); color: #fff; }

/* Mapa */
#map-wrap { flex: 1; position: relative; overflow: hidden; }
#lmap { position: absolute; inset: 0; z-index: 1; }

/* Permiso GPS overlay */
#map-perm {
  position: absolute; inset: 0; z-index: 500;
  background: rgba(248,245,241,.97);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 16px; padding: 32px; text-align: center;
}
.perm-ico { font-size: 64px; }
#map-perm h3 { font-family:'Syne',sans-serif; font-size:24px; letter-spacing:-.5px; }
#map-perm p { font-size: 14px; color: var(--ink3); line-height: 1.7; max-width: 280px; }

/* Barra inferior del mapa */
.mapbar {
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 12px 16px; display: flex; gap: 10px; flex-shrink: 0;
}
.ipill { flex:1;background:var(--bg);border-radius:var(--rsm);padding:10px;text-align:center; }
.ipill .lbl { font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin-bottom:2px; }
.ipill .val { font-size:17px;font-weight:700;color:var(--ink); }
.ipill .unit { font-size:9px;color:var(--ink3); }

/* Bottom sheet – detalle restaurante */
.resto-sheet {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 600;
  background: var(--surface); border-radius: var(--rxl) var(--rxl) 0 0;
  box-shadow: 0 -8px 32px rgba(20,17,15,.15);
  transform: translateY(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
  padding: 8px 20px 20px; max-height: 60vh; overflow-y: auto;
}
.resto-sheet.open { transform: translateY(0); }
.sheet-handle { width:44px;height:5px;background:var(--border2);border-radius:3px;margin:0 auto 18px; }

.sheet-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 16px; }
.sheet-ico { width:60px;height:60px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0; }
.sheet-info { flex:1; }
.sheet-name { font-family:'Syne',sans-serif; font-size:20px; letter-spacing:-.4px; margin-bottom:4px; }
.sheet-meta { font-size:13px; color:var(--ink3); }
.sheet-actions { display:flex;gap:10px;flex-wrap:wrap;margin-top:12px; }

.leaflet-control-zoom a { background:var(--surface)!important;color:var(--ink)!important;border-color:var(--border)!important; }
</style>
</head>
<body>

<!-- Sidebar desktop -->
<aside class="sidebar hide-mobile">
  <div class="sb-brand">
    <div class="sb-logo">🍽️</div>
    <span class="sb-name">EasyFood</span>
  </div>
  <a class="sl" href="index.html"   data-nav="home">   <span class="ic">🏠</span> Inicio</a>
  <a class="sl active" href="mapa.html" data-nav="map"><span class="ic">🗺️</span> Mapa</a>
  <a class="sl" href="resenas.html" data-nav="reviews"><span class="ic">⭐</span> Reseñas</a>
  <a class="sl sl-space" href="perfil.html" data-nav="profile"><span class="ic">👤</span> Mi Perfil</a>
</aside>

<div class="map-page">

  <!-- Top bar -->
  <div class="maptop" id="maptop">
    <a href="index.html" class="btn btn-secondary btn-sm" style="padding:9px 12px;">← Volver</a>
    <h2>Restaurantes en Santiago</h2>
    <div class="gps-dot" id="gps-dot"></div>
  </div>

  <!-- Filtros categoría -->
  <div class="map-filters" id="map-filters"></div>

  <!-- Mapa -->
  <div id="map-wrap" style="margin-top:52px">

    <!-- Permiso GPS -->
    <div id="map-perm">
      <div class="perm-ico">📍</div>
      <h3>Ver locales cerca tuyo</h3>
      <p>Activa tu ubicación para encontrar restaurantes a tu alrededor en tiempo real.</p>
      <button class="btn btn-primary" onclick="startGPS()">Activar ubicación</button>
      <button class="btn btn-secondary btn-sm" onclick="skipGPS()">Ver sin ubicación</button>
    </div>

    <div id="lmap"></div>

    <!-- Bottom sheet -->
    <div class="resto-sheet" id="resto-sheet">
      <div class="sheet-handle"></div>
      <div id="sheet-content"></div>
    </div>
  </div>

  <!-- Barra estado GPS -->
  <div class="mapbar">
    <div class="ipill"><div class="lbl">Precisión</div><div class="val"><span id="v-acc">—</span><span class="unit"> m</span></div></div>
    <div class="ipill"><div class="lbl">Velocidad</div><div class="val"><span id="v-spd">—</span><span class="unit"> km/h</span></div></div>
    <div class="ipill"><div class="lbl">Dirección</div><div class="val" id="v-dir" style="font-size:13px;padding-top:2px">—</div></div>
    <div class="ipill"><div class="lbl">Locales</div><div class="val" id="v-count">15</div></div>
  </div>
</div>

<!-- Bottom nav mobile -->
<nav class="bnav" style="display:none">
  <a class="ni" href="index.html"   data-nav="home">   <span class="ni-icon">🏠</span><span>Inicio</span></a>
  <a class="ni active" href="mapa.html" data-nav="map"><span class="ni-icon">🗺️</span><span>Mapa</span></a>
  <a class="ni" href="resenas.html" data-nav="reviews"><span class="ni-icon">⭐</span><span>Reseñas</span></a>
  <a class="ni" href="perfil.html"  data-nav="profile"><span class="ni-icon">👤</span><span>Perfil</span></div></a>
</nav>

<script src="shared.js"></script>
<script>
let leafMap = null, userMk = null, accCirc = null, hdgLine = null;
let curPos = null, curHdg = null;
let activeCat = 'all';

// ── Filtros ──────────────────────────────────────────────────────────────────
function renderMapFilters() {
  const row = document.getElementById('map-filters');
  row.innerHTML = EF.categories.map(c => `
    <button class="mf-btn ${c.id === activeCat ? 'active' : ''}" onclick="setMapCat('${c.id}')">
      ${c.icon} ${c.label}
    </button>`).join('');
}

function setMapCat(id) {
  activeCat = id;
  renderMapFilters();
  renderMarkers();
}

// ── Inicializar Leaflet ──────────────────────────────────────────────────────
function initLeaflet(center = [-33.444, -70.650], zoom = 13) {
  if (leafMap) return;
  leafMap = L.map('lmap', { zoomControl: true, attributionControl: false });
  leafMap.setView(center, zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { subdomains:'abcd', maxZoom:20 }).addTo(leafMap);
  renderMarkers();
  setTimeout(() => leafMap.invalidateSize(), 150);
}

function renderMarkers() {
  if (!leafMap) return;
  // Limpiar marcadores anteriores (excepto usuario)
  leafMap.eachLayer(l => {
    if (l._efMarker) leafMap.removeLayer(l);
  });
  const list = activeCat === 'all'
    ? EF.restaurants
    : EF.restaurants.filter(r => r.category === activeCat);
  document.getElementById('v-count').textContent = list.length;

  list.forEach(r => {
    const ic = L.divIcon({
      html: `<div style="
        background:#fff;border:2.5px solid #FF5C00;border-radius:20px;
        padding:5px 10px;font-size:12px;font-weight:700;white-space:nowrap;
        box-shadow:0 2px 10px rgba(255,92,0,.25);cursor:pointer;
        display:flex;align-items:center;gap:4px">
        ${r.icon} ${r.name} <span style="color:#FF5C00">★${r.rating}</span>
      </div>`,
      iconAnchor: [0, 20], className: ''
    });
    const mk = L.marker([r.lat, r.lng], { icon: ic }).addTo(leafMap);
    mk._efMarker = true;
    mk.on('click', () => showSheet(r));
  });
}

// ── Bottom sheet ─────────────────────────────────────────────────────────────
function showSheet(r) {
  const content = document.getElementById('sheet-content');
  content.innerHTML = `
    <div class="sheet-header">
      <div class="sheet-ico ${r.ri_class}">${r.icon}</div>
      <div class="sheet-info">
        <div class="sheet-name">${r.name}</div>
        <div class="sheet-meta">★ ${r.rating} · ${r.reviews_count} reseñas · ${r.price}</div>
        <div class="sheet-meta" style="margin-top:2px">📍 ${r.address}</div>
      </div>
    </div>
    <div class="sheet-meta" style="margin-bottom:12px;line-height:1.6">${r.description}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
      ${r.tags.map(t=>`<span class="pill" style="background:var(--bg);color:var(--ink2);border:1px solid var(--border)">${t}</span>`).join('')}
      ${r.delivery ? '<span class="pill pill-green">🛵 Delivery</span>' : ''}
    </div>
    <div class="sheet-actions">
      <a href="restaurante.html?id=${r.id}" class="btn btn-primary btn-sm">Ver reseñas</a>
      <a href="tel:${r.phone}" class="btn btn-secondary btn-sm">📞 Llamar</a>
      <button class="btn btn-secondary btn-sm" onclick="centerOn(${r.lat},${r.lng})">🎯 Centrar</button>
    </div>`;
  document.getElementById('resto-sheet').classList.add('open');
}

function centerOn(lat, lng) {
  leafMap.setView([lat, lng], 16);
  document.getElementById('resto-sheet').classList.remove('open');
}

// Cerrar sheet al tocar mapa
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('lmap').addEventListener('click', () => {
    document.getElementById('resto-sheet').classList.remove('open');
  });
});

// ── GPS ──────────────────────────────────────────────────────────────────────
function startGPS() {
  document.getElementById('map-perm').style.display = 'none';
  initLeaflet();
  if (!navigator.geolocation) {
    document.getElementById('v-acc').textContent = 'No disponible'; return;
  }
  navigator.geolocation.watchPosition(onPos, onErr, { enableHighAccuracy:true, maximumAge:3000, timeout:20000 });
  setupCompass();
}

function skipGPS() {
  document.getElementById('map-perm').style.display = 'none';
  initLeaflet();
}

function onPos(pos) {
  const { latitude:lat, longitude:lng, accuracy:acc, speed:spd, heading:hdg } = pos.coords;
  curPos = { lat, lng };
  document.getElementById('v-acc').textContent = Math.round(acc);
  document.getElementById('v-spd').textContent = spd ? Math.round(spd*3.6) : '0';
  document.getElementById('gps-dot').classList.add('on');
  leafMap.invalidateSize();
  if (!userMk) {
    leafMap.setView([lat, lng], 15);
    userMk = L.circleMarker([lat,lng], {
      radius:14,fillColor:'#FF5C00',color:'#fff',weight:4,fillOpacity:1,zIndexOffset:9999
    }).addTo(leafMap).bindPopup('📍 Estás aquí').openPopup();
    accCirc = L.circle([lat,lng], { radius:acc,color:'#FF5C00',fillColor:'#FF5C00',fillOpacity:.08,weight:1 }).addTo(leafMap);
  } else {
    userMk.setLatLng([lat,lng]);
    accCirc.setLatLng([lat,lng]).setRadius(acc);
  }
  if (hdg != null && !isNaN(hdg) && hdg > 0) { curHdg = hdg; drawHdg(); }
}

function onErr(e) {
  const m = {1:'Sin permiso',2:'Sin señal',3:'Tiempo agotado'};
  document.getElementById('v-acc').textContent = m[e.code]||'Error';
}

function setupCompass() {
  if (typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(s => { if(s==='granted') addOrient(); }).catch(()=>{});
    } else { addOrient(); }
  }
}
function addOrient() {
  window.addEventListener('deviceorientationabsolute', onOrient, true);
  window.addEventListener('deviceorientation', onOrient, true);
}
function onOrient(e) {
  let h = null;
  if (e.webkitCompassHeading != null) h = e.webkitCompassHeading;
  else if (e.absolute && e.alpha != null) h = (360-e.alpha)%360;
  if (h != null) { curHdg = h; drawHdg(); }
}
function drawHdg() {
  if (!curPos || curHdg == null || !leafMap) return;
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  document.getElementById('v-dir').textContent = dirs[Math.round(curHdg/45)%8]+' '+Math.round(curHdg)+'°';
  const rad = curHdg*Math.PI/180, d = 0.0005;
  const dest = [curPos.lat+d*Math.cos(rad), curPos.lng+d*Math.sin(rad)];
  if (hdgLine) leafMap.removeLayer(hdgLine);
  hdgLine = L.polyline([[curPos.lat,curPos.lng],dest],
    {color:'#FF5C00',weight:4,opacity:.9,dashArray:'8,5'}).addTo(leafMap);
}

window.addEventListener('load', renderMapFilters);
</script>
</body>
</html>
