<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EasyFood — Mi Perfil</title>
<link rel="stylesheet" href="shared.css">
<style>
.page-content { padding-bottom:80px; }
.phero { background:var(--ink);padding:56px 20px 36px;position:relative;overflow:hidden;text-align:center; }
.pb1 { position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:var(--brand);opacity:.15; }
.pb2 { position:absolute;bottom:-50px;left:-30px;width:160px;height:160px;border-radius:50%;background:var(--yellow);opacity:.10; }
.p-av { width:90px;height:90px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;margin:0 auto 14px;border:4px solid rgba(255,255,255,.18);font-family:'Syne',sans-serif;position:relative;z-index:1;cursor:pointer; }
.pname  { font-family:'Syne',sans-serif;font-size:24px;color:#fff;letter-spacing:-.5px;margin-bottom:4px;position:relative;z-index:1; }
.phand  { font-size:13px;color:rgba(255,255,255,.5);margin-bottom:16px;position:relative;z-index:1; }
.pbody { padding:20px; }
@media(min-width:768px){ .pbody{padding:28px 40px;display:grid;grid-template-columns:1fr 320px;gap:32px;align-items:start;} }
.pstats { display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px; }
.psc { background:var(--surface);border-radius:var(--rmd);border:1px solid var(--border);padding:16px 12px;text-align:center; }
.psnum { font-family:'Syne',sans-serif;font-size:26px;color:var(--brand);margin-bottom:3px; }
.pslbl { font-size:11px;color:var(--ink3);font-weight:600;text-transform:uppercase;letter-spacing:.4px; }
.psec { margin-bottom:24px; }
.psec h3 { font-family:'Syne',sans-serif;font-size:17px;letter-spacing:-.3px;margin-bottom:12px; }
.rmine { background:var(--surface);border-radius:var(--rmd);border:1px solid var(--border);padding:14px 16px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:box-shadow .15s;text-decoration:none;margin-bottom:10px; }
.rmine:hover { box-shadow:var(--sh-md); }
.fav-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
.fav-card { background:var(--surface);border-radius:var(--rmd);border:1px solid var(--border);padding:12px;cursor:pointer;text-decoration:none;transition:box-shadow .15s; }
.fav-card:hover { box-shadow:var(--sh-md); }
.menulist { background:var(--surface);border-radius:var(--rlg);border:1px solid var(--border);overflow:hidden; }
.mitem { display:flex;align-items:center;gap:12px;padding:15px 18px;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px;font-weight:600;transition:background .15s;color:var(--ink2);text-decoration:none; }
.mitem:last-child { border-bottom:none; }
.mitem:hover { background:var(--bg); }
.mitem .mic { font-size:20px;width:28px;text-align:center; }
.mitem .mar { margin-left:auto;color:var(--ink3); }
.mitem.danger { color:var(--red); }
/* Edit sheet */
.edit-overlay { position:fixed;inset:0;background:rgba(20,17,15,.6);z-index:800;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s; }
.edit-overlay.open { opacity:1;pointer-events:all; }
.edit-sheet { background:var(--surface);border-radius:var(--rxl) var(--rxl) 0 0;width:100%;max-width:600px;padding:8px 24px 40px;max-height:90vh;overflow-y:auto;transform:translateY(40px);transition:transform .35s cubic-bezier(.4,0,.2,1); }
.edit-overlay.open .edit-sheet { transform:translateY(0); }
.sheet-handle { width:44px;height:5px;background:var(--border2);border-radius:3px;margin:10px auto 20px; }
</style>
</head>
<body>

<aside class="sidebar hide-mobile">
  <div class="sb-brand"><div class="sb-logo">🍽️</div><span class="sb-name">EasyFood</span></div>
  <a class="sl" href="index.html"><span class="ic">🏠</span> Inicio</a>
  <a class="sl" href="mapa.html"><span class="ic">🗺️</span> Mapa</a>
  <a class="sl" href="resenas.html"><span class="ic">⭐</span> Reseñas</a>
  <a class="sl active sl-space" href="perfil.html"><span class="ic">👤</span> Mi Perfil</a>
</aside>

<main class="main-with-sidebar page-content">
  <div class="phero">
    <div class="pb1"></div><div class="pb2"></div>
    <div class="p-av" onclick="openEdit()" id="p-av">…</div>
    <div class="pname" id="p-name">Cargando…</div>
    <div class="phand" id="p-hand"></div>
  </div>

  <div class="pbody">
    <div>
      <div class="pstats">
        <div class="psc"><div class="psnum" id="st-reviews">…</div><div class="pslbl">Reseñas</div></div>
        <div class="psc"><div class="psnum" id="st-favs">…</div><div class="pslbl">Favoritos</div></div>
        <div class="psc"><div class="psnum" id="st-avg">…</div><div class="pslbl">Promedio</div></div>
      </div>

      <div class="psec">
        <h3>Mis últimas reseñas</h3>
        <div id="my-reviews"><div style="color:var(--ink3);font-size:14px">Cargando…</div></div>
      </div>

      <div class="psec">
        <h3>Mis favoritos ❤️</h3>
        <div class="fav-grid" id="fav-grid"><div style="color:var(--ink3);font-size:14px;grid-column:span 2">Cargando…</div></div>
      </div>
    </div>

    <div>
      <div class="psec">
        <h3>Cuenta</h3>
        <div class="menulist">
          <a class="mitem" href="#" onclick="openEdit()"><span class="mic">✏️</span>Editar perfil<span class="mar">›</span></a>
          <a class="mitem" href="#"><span class="mic">🔔</span>Notificaciones<span class="mar">›</span></a>
          <a class="mitem" href="#"><span class="mic">🎁</span>Invitar amigos<span class="mar">›</span></a>
          <a class="mitem" href="#"><span class="mic">❓</span>Ayuda<span class="mar">›</span></a>
          <a class="mitem danger" href="#" onclick="doSignOut()"><span class="mic">🚪</span>Cerrar sesión</a>
        </div>
      </div>
    </div>
  </div>
</main>

<nav class="bnav">
  <a class="ni" href="index.html"><span class="ni-icon">🏠</span><span>Inicio</span></a>
  <a class="ni" href="mapa.html"><span class="ni-icon">🗺️</span><span>Mapa</span></a>
  <a class="ni" href="resenas.html"><span class="ni-icon">⭐</span><span>Reseñas</span></a>
  <a class="ni active" href="perfil.html"><span class="ni-icon">👤</span><span>Perfil</span></a>
</nav>

<!-- Edit overlay -->
<div class="edit-overlay" id="edit-overlay" onclick="closeEdit(event)">
  <div class="edit-sheet">
    <div class="sheet-handle"></div>
    <h2 style="font-family:'Syne',sans-serif;font-size:22px;margin-bottom:20px">Editar perfil</h2>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="input-group"><label>Nombre</label><input class="input" id="ed-name" placeholder="Nombre"></div>
        <div class="input-group"><label>Apellido</label><input class="input" id="ed-last" placeholder="Apellido"></div>
      </div>
      <div class="input-group"><label>Bio</label>
        <textarea class="input" id="ed-bio" rows="2" placeholder="Cuéntanos algo de ti…" style="resize:none"></textarea>
      </div>
      <div id="edit-error" style="color:var(--red);font-size:13px;display:none"></div>
      <button class="btn btn-primary btn-full" onclick="saveProfile()">Guardar cambios</button>
      <button class="btn btn-ghost btn-full" onclick="closeEdit()">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import { SUPABASE_URL, SUPABASE_KEY } from './config.js';

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const { data:{ session } } = await sb.auth.getSession();
if (!session) { location.href='login.html'; }

const uid = session.user.id;
let profileData = null;

function showToast(msg){
  let t=document.getElementById('gt');
  if(!t){t=document.createElement('div');t.id='gt';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── Cargar perfil ─────────────────────────────────────────────────────────────
async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', uid).single();
  profileData = data;
  const name = data?.name || session.user.user_metadata?.name || session.user.email;
  const initials = name?.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) || '👤';
  document.getElementById('p-av').textContent = initials;
  document.getElementById('p-name').textContent = name||'—';
  document.getElementById('p-hand').textContent = `${data?.handle||session.user.email}`;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  const { count: rvCount } = await sb.from('reviews').select('*',{count:'exact',head:true}).eq('user_id',uid);
  const { count: favCount } = await sb.from('favorites').select('*',{count:'exact',head:true}).eq('user_id',uid);
  const { data: rvs } = await sb.from('reviews').select('rating').eq('user_id',uid);
  const avg = rvs?.length ? (rvs.reduce((a,r)=>a+r.rating,0)/rvs.length).toFixed(1) : '—';
  document.getElementById('st-reviews').textContent = rvCount||0;
  document.getElementById('st-favs').textContent    = favCount||0;
  document.getElementById('st-avg').textContent     = avg+(avg!=='—'?'★':'');
}

// ── Mis reseñas ───────────────────────────────────────────────────────────────
async function loadMyReviews() {
  const { data } = await sb.from('reviews')
    .select('*, restaurants(id,name,icon,ri_class)')
    .eq('user_id', uid).order('created_at',{ascending:false}).limit(5);
  const el = document.getElementById('my-reviews');
  el.innerHTML = data?.length ? data.map(r=>{
    const fecha = new Date(r.created_at).toLocaleDateString('es-CL',{day:'numeric',month:'short'});
    return `<a class="rmine" href="restaurante.html?id=${r.restaurants?.id}">
      <div style="width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--bg)">${r.restaurants?.icon||'🍽️'}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;margin-bottom:2px;color:var(--ink)">${r.restaurants?.name||'—'}</div>
        <div style="font-size:12px;color:var(--ink3)">${fecha} · ${'★'.repeat(r.rating)}</div>
      </div>
      <span style="color:var(--ink3);font-size:20px">›</span>
    </a>`}).join('')
  : '<p style="color:var(--ink3);font-size:14px">Aún no has escrito reseñas.</p>';
}

// ── Favoritos ─────────────────────────────────────────────────────────────────
async function loadFavs() {
  const { data } = await sb.from('favorites')
    .select('restaurants(id,name,icon,ri_class,comunas(name))')
    .eq('user_id', uid);
  const el = document.getElementById('fav-grid');
  const list = data?.map(f=>f.restaurants).filter(Boolean)||[];
  el.innerHTML = list.length ? list.map(r=>`
    <a class="fav-card" href="restaurante.html?id=${r.id}">
      <div style="font-size:24px;margin-bottom:6px">${r.icon||'🍽️'}</div>
      <div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px">${r.name}</div>
      <div style="font-size:11px;color:var(--ink3)">${r.comunas?.name||''}</div>
    </a>`).join('')
  : '<p style="color:var(--ink3);font-size:14px;grid-column:span 2">Aún no tienes favoritos.</p>';
}

// ── Edit perfil ───────────────────────────────────────────────────────────────
window.openEdit = () => {
  const name = (profileData?.name||'').split(' ');
  document.getElementById('ed-name').value = name[0]||'';
  document.getElementById('ed-last').value = name.slice(1).join(' ')||'';
  document.getElementById('ed-bio').value  = profileData?.bio||'';
  document.getElementById('edit-overlay').classList.add('open');
};
window.closeEdit = (e) => {
  if (!e || e.target===document.getElementById('edit-overlay'))
    document.getElementById('edit-overlay').classList.remove('open');
};
window.saveProfile = async () => {
  const name = (document.getElementById('ed-name').value+' '+document.getElementById('ed-last').value).trim();
  const bio  = document.getElementById('ed-bio').value.trim();
  const handle = '@'+name.toLowerCase().replace(/\s+/g,'');
  const { error } = await sb.from('profiles').update({ name, bio, handle }).eq('id', uid);
  if (error){ document.getElementById('edit-error').textContent=error.message; document.getElementById('edit-error').style.display='block'; return; }
  window.closeEdit();
  showToast('✅ Perfil actualizado');
  loadProfile();
};

// ── Cerrar sesión ─────────────────────────────────────────────────────────────
window.doSignOut = async () => {
  await sb.auth.signOut();
  location.href='login.html';
};

// ── Init ──────────────────────────────────────────────────────────────────────
loadProfile();
loadStats();
loadMyReviews();
loadFavs();
</script>
</body>
</html>
